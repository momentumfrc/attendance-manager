<div class="search">
  <mat-icon aria-hidden="false" aria-label="Search icon" fontIcon="search"></mat-icon>
  <input type="text" [formControl]="searchControl" autocomplete="off" data-1p-ignore>
  @if (shouldShowCancel|async) {
    <mat-icon aria-hidden="false" aria-label="Clear" (click)="clearSearch()">cancel</mat-icon>
  }
</div>

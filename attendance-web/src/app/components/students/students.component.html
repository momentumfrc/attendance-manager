@if (tabs|async; as tabs) {
  <nav mat-tab-nav-bar [tabPanel]="studentTabPanel" mat-stretch-tabs="false" mat-align-tabs="start" id="navTabs">
    @for (tab of tabs; track tab) {
      <a mat-tab-link
        [routerLink]="tab.path"
        routerLinkActive #rla="routerLinkActive"
      [active]="rla.isActive">{{tab.name}}</a>
    }
  </nav>
}
<mat-tab-nav-panel #studentTabPanel>
  <mat-divider></mat-divider>
  <router-outlet></router-outlet>
</mat-tab-nav-panel>

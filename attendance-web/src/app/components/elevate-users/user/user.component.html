<mat-list-item>
  <div class="userItem">
    <div class="userName">{{user.name}}</div>
    <div class="userActions">
      <mat-form-field subscriptSizing="dynamic">
      <mat-label>Role</mat-label>
      <mat-select (closed)="menuClosed()" [formControl]="selectedRole">
        @for (role of roles | async; track role) {
            <mat-option [value]="role" class="roleOption">{{role}}</mat-option>
          }
      </mat-select>
      </mat-form-field>
      @if(this.canDeleteUser() | async) {
        <button matIconButton aria-label="Delete user" (click)="deleteUser()"><mat-icon>delete</mat-icon></button>
      }
    </div>
  </div>
</mat-list-item>

<app-search-box></app-search-box>
@if (users | async; as users) {
  <mat-list>
    @for (user of users; track user; let isLast = $last) {
      <app-user-role-selector [user]="user"></app-user-role-selector>
      @if (!isLast) {
        <mat-divider></mat-divider>
      }
    }
    @if ((noUsers() | async) == true) {
      <mat-list-item id="noResults">
        No matching users found!
      </mat-list-item>
    }
  </mat-list>
} @else {
  <app-spinner></app-spinner>
}

<nav mat-tab-nav-bar [tabPanel]="reportTabPanel" mat-stretch-tabs="false" mat-align-tabs="start">
  @for (tab of tabs; track tab) {
    <a mat-tab-link
      [routerLink]="tab.path"
      routerLinkActive #rla="routerLinkActive"
    [active]="rla.isActive">{{tab.name}}</a>
  }
</nav>
<mat-tab-nav-panel #reportTabPanel>
  <mat-divider></mat-divider>
  <router-outlet></router-outlet>
</mat-tab-nav-panel>
